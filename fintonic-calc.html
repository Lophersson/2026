<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calculadora FinTech</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c12;--bg2:#0f1620;--bg3:#172030;--s:#1e2a3d;--b:#283a52;--a:#c9a84c;--a2:#e8c96e;--as:rgba(201,168,76,.12);--t:#e8edf5;--t2:#a8b4c8;--t3:#5a6a84;--r:14px;--ff:'Cormorant Garamond',serif;--fb:'Outfit',sans-serif;--fm:'DM Mono',monospace}
[data-theme=light]{--bg:#f0ebe0;--bg2:#faf7f0;--bg3:#fff;--s:#fff;--b:#e0d5c0;--a:#8b6914;--a2:#a07820;--as:rgba(139,105,20,.1);--t:#1a1a2e;--t2:#3d4466;--t3:#8a8aaa}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100vh}
#bar{display:flex;justify-content:space-between;align-items:center;padding:10px 28px;background:var(--bg2);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:99;flex-wrap:wrap;gap:8px}
.logo{font-family:var(--ff);font-size:1.25rem;font-weight:700;color:var(--a)}
.logo span{font-size:.66rem;color:var(--t3);font-family:var(--fb);letter-spacing:.1em;text-transform:uppercase;display:block;margin-top:-3px}
.btn{padding:5px 12px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--t2);font-family:var(--fb);font-size:.74rem;cursor:pointer;transition:all .2s}
.btn:hover,.btn.on{background:var(--a);border-color:var(--a);color:#080c12;font-weight:600}
#wrap{max-width:1100px;margin:0 auto;padding:28px 20px 60px}
.page-title{font-family:var(--ff);font-size:2rem;font-weight:700;color:var(--a);margin-bottom:4px}
.page-sub{font-size:.8rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px}
.main-grid{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
.panel{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:26px}
.panel-title{font-family:var(--ff);font-size:1.1rem;font-weight:600;color:var(--a);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--b)}
.field{margin-bottom:18px}
.field label{display:block;font-size:.74rem;font-weight:600;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.field input,.field select{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;color:var(--t);font-family:var(--fm);font-size:.88rem;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--a)}
.field input[type=range]{padding:4px 0;background:transparent;border:none;accent-color:var(--a);cursor:pointer}
.range-row{display:flex;justify-content:space-between;font-size:.72rem;color:var(--t3);margin-top:4px}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.type-btn{padding:9px;border-radius:8px;border:1px solid var(--b);background:var(--bg3);color:var(--t2);font-size:.78rem;cursor:pointer;text-align:center;transition:all .2s}
.type-btn.on{background:var(--as);border-color:var(--a);color:var(--a);font-weight:600}
.results{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.res-card{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:16px;text-align:center}
.res-label{font-size:.68rem;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.res-val{font-family:var(--fm);font-size:1.45rem;color:var(--a);font-weight:500}
.res-val.big{font-size:1.7rem}
.summary-box{background:var(--as);border:1px solid var(--a);border-radius:10px;padding:14px 16px;margin-bottom:20px}
.sum-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.82rem}
.sum-lbl{color:var(--t2)}.sum-val{font-family:var(--fm);color:var(--a);font-weight:500}
.table-wrap{overflow-x:auto;max-height:340px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{font-size:.66rem;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--bg2)}
td{padding:7px 10px;border-bottom:1px solid var(--b);font-family:var(--fm);color:var(--t2)}
td:first-child{color:var(--t);font-family:var(--fb)}
tr:hover td{background:var(--as)}
.badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:.68rem;font-weight:700;background:var(--as);border:1px solid var(--a);color:var(--a);letter-spacing:.05em;text-transform:uppercase;margin-bottom:16px}
@media(max-width:800px){.main-grid{grid-template-columns:1fr}.results{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="bar">
  <div>
    <div class="logo">FinTech Calc<span id="logo-sub">Calculadora de Préstamos</span></div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn on" id="b-es" onclick="setL('es')">🇪🇸 ES</button>
    <button class="btn" id="b-en" onclick="setL('en')">🇬🇧 EN</button>
    <button class="btn" id="b-pt" onclick="setL('pt')">🇵🇹 PT</button>
    <button class="btn" id="b-th" onclick="toggleTheme()">☀️ <span id="th-lbl">Claro</span></button>
  </div>
</div>
<div id="wrap">
  <div class="page-title" id="pt">Calculadora FinTech</div>
  <div class="page-sub" id="ps">Préstamos · Cuotas · TAE · Amortización</div>
  <div class="main-grid">
    <div>
      <div class="panel">
        <div class="panel-title" id="panel1-t">Parámetros del Préstamo</div>
        <div class="type-row">
          <button class="type-btn on" id="tp0" onclick="setType(0)" id="tp-f"><span id="tp0t">Cuota Fija</span></button>
          <button class="type-btn" id="tp1" onclick="setType(1)"><span id="tp1t">Cuota Variable</span></button>
        </div>
        <div class="field">
          <label id="lbl-cap">Capital Solicitado (€)</label>
          <input type="number" id="inp-cap" value="15000" min="1000" max="300000" step="500" oninput="calc()">
        </div>
        <div class="field">
          <label id="lbl-tae">TIN Anual (%)</label>
          <input type="range" id="inp-tin" value="6.5" min="1" max="25" step="0.1" oninput="syncTin(this.value);calc()">
          <div class="range-row"><span>1%</span><span id="tin-disp" style="color:var(--a);font-family:var(--fm);font-weight:600">6.5%</span><span>25%</span></div>
        </div>
        <div class="field">
          <label id="lbl-com">Comisión Apertura (%)</label>
          <input type="range" id="inp-com" value="1.5" min="0" max="5" step="0.1" oninput="syncCom(this.value);calc()">
          <div class="range-row"><span>0%</span><span id="com-disp" style="color:var(--a);font-family:var(--fm);font-weight:600">1.5%</span><span>5%</span></div>
        </div>
        <div class="field">
          <label id="lbl-pl">Plazo</label>
          <select id="inp-pl" onchange="calc()">
            <option value="12">12 meses</option><option value="24">24 meses</option><option value="36" selected>36 meses</option>
            <option value="48">48 meses</option><option value="60">60 meses</option><option value="84">84 meses</option><option value="120">120 meses</option><option value="180">180 meses</option><option value="240">240 meses</option><option value="360">360 meses</option>
          </select>
        </div>
        <div class="field">
          <label id="lbl-seg">Seguro Mensual (€)</label>
          <input type="number" id="inp-seg" value="0" min="0" max="200" step="1" oninput="calc()">
        </div>
      </div>
    </div>
    <div>
      <div class="panel" style="margin-bottom:20px">
        <span class="badge" id="loan-type-badge">SISTEMA FRANCÉS</span>
        <div class="results" id="res-grid"></div>
        <div class="summary-box" id="sum-box"></div>
      </div>
      <div class="panel">
        <div class="panel-title" id="panel2-t">Cuadro de Amortización</div>
        <div class="table-wrap"><table><thead><tr id="thr"></tr></thead><tbody id="tbd"></tbody></table></div>
      </div>
    </div>
  </div>
</div>
<script>
var isDark=true,lang='es',loanType=0;
var TXT={
  es:{logoSub:'Calculadora de Préstamos',pt:'Calculadora FinTech',ps:'Préstamos · Cuotas · TAE · Amortización',panel1:'Parámetros del Préstamo',panel2:'Cuadro de Amortización',types:['Cuota Fija','Cuota Variable'],lblCap:'Capital Solicitado (€)',lblTae:'TIN Anual (%)',lblCom:'Comisión Apertura (%)',lblPl:'Plazo',lblSeg:'Seguro Mensual (€)',res:['Cuota Mensual','TAE','Total a Pagar','Coste Total'],sum:['Capital','Intereses Totales','Comisión Apertura','Seguros','Coste Total Crédito'],thr:['Mes','Cuota','Capital','Intereses','Cap.Pendiente'],badge:['SISTEMA FRANCÉS','CUOTA VARIABLE'],thOn:'Oscuro',thOff:'Claro'},
  en:{logoSub:'Loan Calculator',pt:'FinTech Calculator',ps:'Loans · Instalments · APR · Amortisation',panel1:'Loan Parameters',panel2:'Amortisation Schedule',types:['Fixed Rate','Variable Rate'],lblCap:'Loan Amount (€)',lblTae:'Annual Rate (%)',lblCom:'Opening Fee (%)',lblPl:'Term',lblSeg:'Monthly Insurance (€)',res:['Monthly Payment','APR','Total Repayable','Total Cost'],sum:['Principal','Total Interest','Opening Fee','Insurance','Total Credit Cost'],thr:['Month','Payment','Principal','Interest','Balance'],badge:['FRENCH SYSTEM','VARIABLE RATE'],thOn:'Dark',thOff:'Light'},
  pt:{logoSub:'Calculadora de Empréstimos',pt:'Calculadora FinTech',ps:'Empréstimos · Prestações · TAEG · Amortização',panel1:'Parâmetros do Empréstimo',panel2:'Plano de Amortização',types:['Prestação Fixa','Prestação Variável'],lblCap:'Capital Solicitado (€)',lblTae:'TAN Anual (%)',lblCom:'Comissão Abertura (%)',lblPl:'Prazo',lblSeg:'Seguro Mensal (€)',res:['Prestação Mensal','TAEG','Total a Pagar','Custo Total'],sum:['Capital','Juros Totais','Comissão Abertura','Seguros','Custo Total Crédito'],thr:['Mês','Prestação','Capital','Juros','Capital Pendente'],badge:['SISTEMA FRANCÊS','PRESTAÇÃO VARIÁVEL'],thOn:'Escuro',thOff:'Claro'}
};
function fmt(n,d){return n.toLocaleString('es-ES',{minimumFractionDigits:d||2,maximumFractionDigits:d||2});}
function setType(n){loanType=n;[0,1].forEach(function(i){document.getElementById('tp'+i).classList.toggle('on',i===n);});calc();}
function syncTin(v){document.getElementById('tin-disp').textContent=parseFloat(v).toFixed(1)+'%';}
function syncCom(v){document.getElementById('com-disp').textContent=parseFloat(v).toFixed(1)+'%';}
function calc(){
  var cap=parseFloat(document.getElementById('inp-cap').value)||0;
  var tin=parseFloat(document.getElementById('inp-tin').value)||0;
  var com=parseFloat(document.getElementById('inp-com').value)||0;
  var pl=parseInt(document.getElementById('inp-pl').value)||12;
  var seg=parseFloat(document.getElementById('inp-seg').value)||0;
  var r=tin/100/12;
  var cuota=r>0?cap*(r*Math.pow(1+r,pl))/(Math.pow(1+r,pl)-1):cap/pl;
  var comEur=cap*com/100;
  var totalSeg=seg*pl;
  var totalPag=cuota*pl+totalSeg;
  var totalInt=cuota*pl-cap;
  var coste=totalInt+comEur+totalSeg;
  var tae=calcTAE(cap-comEur,cuota+seg,pl);
  var t=TXT[lang];
  document.getElementById('loan-type-badge').textContent=t.badge[loanType];
  document.getElementById('res-grid').innerHTML=[cuota,tae,totalPag,coste].map(function(v,i){
    return '<div class="res-card"><div class="res-label">'+t.res[i]+'</div><div class="res-val '+(i===0?'big':'')+'">'+fmt(v)+(i===1||i===3?'':'')+' €'+(i===1?'</div>':i===2?'':'')+( i!==1?'':'')+'</div>'+(i===1?'':'')+' </div>';
  }).join('').replace(' €</div> ','% </div>').replace(' €</div>  </div>','% </div>');
  document.getElementById('res-grid').innerHTML='<div class="res-card"><div class="res-label">'+t.res[0]+'</div><div class="res-val big">'+fmt(cuota)+' €</div></div>'+'<div class="res-card"><div class="res-label">'+t.res[1]+'</div><div class="res-val">'+fmt(tae,2)+' %</div></div>'+'<div class="res-card"><div class="res-label">'+t.res[2]+'</div><div class="res-val">'+fmt(totalPag)+' €</div></div>'+'<div class="res-card"><div class="res-label">'+t.res[3]+'</div><div class="res-val">'+fmt(coste)+' €</div></div>';
  var sums=[cap,totalInt,comEur,totalSeg,coste];
  document.getElementById('sum-box').innerHTML=t.sum.map(function(s,i){return '<div class="sum-row"><span class="sum-lbl">'+s+'</span><span class="sum-val">'+fmt(sums[i])+' €</span></div>';}).join('');
  buildTable(cap,r,cuota,pl,seg,t);
}
function calcTAE(pv,pmt,n){
  var r=0.005;
  for(var i=0;i<100;i++){
    var f=0,df=0;
    for(var k=1;k<=n;k++){f+=pmt/Math.pow(1+r,k/12);}
    f-=pv;
    for(var k=1;k<=n;k++){df-=pmt*(k/12)/Math.pow(1+r,k/12+1);}
    var nr=r-f/df;
    if(Math.abs(nr-r)<1e-8){r=nr;break;}
    r=nr;
  }
  return r*1200;
}
function buildTable(cap,r,cuota,pl,seg,t){
  var rows=[]; var bal=cap;
  var maxShow=Math.min(pl,360);
  for(var i=1;i<=maxShow;i++){
    var int=bal*r; var prin=cuota-int; bal=Math.max(0,bal-prin);
    rows.push([i,cuota+seg,prin,int,bal]);
  }
  document.getElementById('thr').innerHTML=t.thr.map(function(h){return '<th>'+h+'</th>';}).join('');
  document.getElementById('tbd').innerHTML=rows.map(function(r){return '<tr><td>'+r[0]+'</td>'+r.slice(1).map(function(v){return '<td>'+fmt(v)+' €</td>';}).join('')+'</tr>';}).join('');
}
function setL(l){
  lang=l;
  ['es','en','pt'].forEach(function(x){document.getElementById('b-'+x).classList.toggle('on',x===l);});
  var t=TXT[l];
  document.getElementById('logo-sub').textContent=t.logoSub;
  document.getElementById('pt').textContent=t.pt;
  document.getElementById('ps').textContent=t.ps;
  document.getElementById('panel1-t').textContent=t.panel1;
  document.getElementById('panel2-t').textContent=t.panel2;
  document.getElementById('tp0t').textContent=t.types[0];
  document.getElementById('tp1t').textContent=t.types[1];
  document.getElementById('lbl-cap').textContent=t.lblCap;
  document.getElementById('lbl-tae').textContent=t.lblTae;
  document.getElementById('lbl-com').textContent=t.lblCom;
  document.getElementById('lbl-pl').textContent=t.lblPl;
  document.getElementById('lbl-seg').textContent=t.lblSeg;
  calc();
}
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  var t=TXT[lang];
  document.getElementById('b-th').innerHTML=(isDark?'☀️ ':'🌙 ')+'<span id="th-lbl">'+(isDark?t.thOff:t.thOn)+'</span>';
}
syncTin(6.5);syncCom(1.5);calc();
</script>
</body></html>
