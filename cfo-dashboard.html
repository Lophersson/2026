<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard CFO</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0d13;--bg2:#111827;--bg3:#1a2235;--s:#212d42;--b:#2a3a52;--a:#c9a84c;--a2:#e8c96e;--as:rgba(201,168,76,.12);--t:#e8edf5;--t2:#a8b4c8;--t3:#5a6a84;--r:14px;--ff:'Cormorant Garamond',serif;--fb:'Outfit',sans-serif;--fm:'DM Mono',monospace}
[data-theme=light]{--bg:#f0ebe0;--bg2:#faf7f0;--bg3:#fff;--s:#fff;--b:#e0d5c0;--a:#8b6914;--a2:#a07820;--as:rgba(139,105,20,.1);--t:#1a1a2e;--t2:#3d4466;--t3:#8a8aaa}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100vh}
#bar{display:flex;justify-content:space-between;align-items:center;padding:10px 28px;background:var(--bg2);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:99;flex-wrap:wrap;gap:8px}
.bar-l{display:flex;align-items:center;gap:8px}
.logo{font-family:var(--ff);font-size:1.3rem;font-weight:700;color:var(--a);letter-spacing:.02em;margin-right:6px}
.logo span{font-size:.7rem;color:var(--t3);font-family:var(--fb);font-weight:400;letter-spacing:.1em;text-transform:uppercase;display:block;margin-top:-4px}
.btn{padding:5px 13px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--t2);font-family:var(--fb);font-size:.74rem;cursor:pointer;transition:all .2s}
.btn:hover,.btn.on{background:var(--a);border-color:var(--a);color:#0a0d13;font-weight:600}
#wrap{max-width:1200px;margin:0 auto;padding:28px 20px 60px}
.hero-h{font-family:var(--ff);font-size:2.2rem;font-weight:700;color:var(--a);margin-bottom:4px}
.hero-sub{font-size:.82rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px}
.scenario-row{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.sc-btn{flex:1;min-width:120px;padding:10px 16px;border-radius:10px;border:1px solid var(--b);background:var(--bg3);color:var(--t2);font-family:var(--fb);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .25s;text-align:center}
.sc-btn:hover{border-color:var(--a);color:var(--a)}
.sc-btn.on{background:var(--as);border-color:var(--a);color:var(--a);font-weight:600}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:18px 20px;transition:border-color .2s}
.kpi:hover{border-color:var(--a)}
.kpi-label{font-size:.72rem;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-family:var(--fm);font-size:1.6rem;font-weight:500;color:var(--a);margin-bottom:4px}
.kpi-delta{font-size:.73rem;font-weight:600;display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px}
.kpi-delta.up{color:#4ade80;background:rgba(74,222,128,.12)}
.kpi-delta.dn{color:#f87171;background:rgba(248,113,113,.12)}
.charts-row{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:28px}
.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:22px 24px}
.card-title{font-family:var(--ff);font-size:1.05rem;font-weight:600;color:var(--a);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.charts-row2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{font-size:.68rem;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--b);text-align:left}
td{padding:8px 12px;border-bottom:1px solid var(--b);color:var(--t2);font-family:var(--fm);font-size:.79rem}
tr:hover td{background:var(--as)}
td.pos{color:#4ade80}td.neg{color:#f87171}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-val{font-family:var(--fm);font-size:1.8rem;color:var(--a);font-weight:500}
.gauge-lbl{font-size:.73rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}.charts-row2{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr}.charts-row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="bar">
  <div class="bar-l">
    <div class="logo">CFO Dashboard<span id="logo-sub">Análisis Financiero Ejecutivo</span></div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn on" id="b-es" onclick="setL('es')">🇪🇸 ES</button>
    <button class="btn" id="b-en" onclick="setL('en')">🇬🇧 EN</button>
    <button class="btn" id="b-pt" onclick="setL('pt')">🇵🇹 PT</button>
    <button class="btn" id="b-th" onclick="toggleTheme()">☀️ <span id="th-lbl">Claro</span></button>
  </div>
</div>
<div id="wrap">
  <div class="hero-h" id="h-title">Dashboard CFO</div>
  <div class="hero-sub" id="h-sub">Panel ejecutivo · Escenarios financieros · KPIs</div>
  <div class="scenario-row">
    <button class="sc-btn on" id="sc0" onclick="setScenario(0)"><span id="sc0t">Caso Base</span></button>
    <button class="sc-btn" id="sc1" onclick="setScenario(1)"><span id="sc1t">Optimista</span></button>
    <button class="sc-btn" id="sc2" onclick="setScenario(2)"><span id="sc2t">Pesimista</span></button>
    <button class="sc-btn" id="sc3" onclick="setScenario(3)"><span id="sc3t">Presupuestado</span></button>
  </div>
  <div class="kpi-grid" id="kpi-grid"></div>
  <div class="charts-row">
    <div class="card"><div class="card-title">📈 <span id="ct1">Evolución de Ingresos vs Gastos</span></div><canvas id="ch1" height="200"></canvas></div>
    <div class="card"><div class="card-title">🥧 <span id="ct2">Estructura de Costes</span></div><canvas id="ch2" height="200"></canvas></div>
  </div>
  <div class="charts-row2">
    <div class="card"><div class="card-title">📊 <span id="ct3">EBITDA Mensual</span></div><canvas id="ch3" height="180"></canvas></div>
    <div class="card"><div class="card-title">💧 <span id="ct4">Flujo de Caja</span></div><canvas id="ch4" height="180"></canvas></div>
    <div class="card"><div class="card-title">🎯 <span id="ct5">Rentabilidad</span></div>
      <div class="gauge-wrap" style="margin-top:20px">
        <canvas id="ch5" width="160" height="100"></canvas>
        <div class="gauge-val" id="g-val">–</div>
        <div class="gauge-lbl" id="g-lbl">ROE</div>
      </div>
    </div>
  </div>
  <div class="card"><div class="card-title">📋 <span id="ct6">P&L Detallado</span></div>
    <div class="table-wrap"><table><thead><tr id="thr"></tr></thead><tbody id="tbd"></tbody></table></div>
  </div>
</div>
<script>
var isDark=true, lang='es', scenario=0;
var MONTHS={es:['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],en:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],pt:['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']};
var SCENARIOS=[
  {rev:[820,850,880,910,940,960,980,970,1010,1040,1070,1100],costs:[600,610,620,630,640,650,660,655,670,680,690,700]},
  {rev:[870,910,950,990,1030,1060,1090,1080,1120,1160,1200,1240],costs:[590,600,608,615,620,625,630,625,635,640,645,650]},
  {rev:[720,730,740,750,760,760,770,760,780,790,800,810],costs:[650,660,670,680,690,700,710,705,720,730,740,750]},
  {rev:[800,830,860,890,920,950,970,960,1000,1030,1060,1090],costs:[620,630,640,650,660,670,680,675,690,700,710,720]}
];
var TXT={
  es:{logoSub:'Análisis Financiero Ejecutivo',hTitle:'Dashboard CFO',hSub:'Panel ejecutivo · Escenarios financieros · KPIs',sc:['Caso Base','Optimista','Pesimista','Presupuestado'],ct1:'Evolución de Ingresos vs Gastos',ct2:'Estructura de Costes',ct3:'EBITDA Mensual',ct4:'Flujo de Caja',ct5:'Rentabilidad',ct6:'P&L Detallado',kpi:['Ingresos YTD','EBITDA','Margen Neto','Flujo de Caja'],thOn:'Oscuro',thOff:'Claro',thr:['Concepto','Q1','Q2','Q3','Q4','Total'],rows:['Ingresos','Costes Variables','Margen Bruto','Gastos Fijos','EBITDA','Amortización','EBIT','Impuestos','Beneficio Neto'],pie:['Personal','Servicios','Marketing','Tecnología','Otros']},
  en:{logoSub:'Executive Financial Analysis',hTitle:'CFO Dashboard',hSub:'Executive panel · Financial scenarios · KPIs',sc:['Base Case','Optimistic','Pessimistic','Budgeted'],ct1:'Revenue vs Costs Evolution',ct2:'Cost Structure',ct3:'Monthly EBITDA',ct4:'Cash Flow',ct5:'Profitability',ct6:'Detailed P&L',kpi:['YTD Revenue','EBITDA','Net Margin','Cash Flow'],thOn:'Dark',thOff:'Light',thr:['Item','Q1','Q2','Q3','Q4','Total'],rows:['Revenue','Variable Costs','Gross Margin','Fixed Costs','EBITDA','Amortisation','EBIT','Taxes','Net Income'],pie:['Personnel','Services','Marketing','Technology','Others']},
  pt:{logoSub:'Análise Financeira Executiva',hTitle:'Dashboard CFO',hSub:'Painel executivo · Cenários financeiros · KPIs',sc:['Caso Base','Otimista','Pessimista','Orçamentado'],ct1:'Evolução de Receitas vs Custos',ct2:'Estrutura de Custos',ct3:'EBITDA Mensal',ct4:'Fluxo de Caixa',ct5:'Rentabilidade',ct6:'P&L Detalhado',kpi:['Receitas YTD','EBITDA','Margem Líquida','Fluxo de Caixa'],thOn:'Escuro',thOff:'Claro',thr:['Conceito','Q1','Q2','Q3','Q4','Total'],rows:['Receitas','Custos Variáveis','Margem Bruta','Custos Fixos','EBITDA','Amortização','EBIT','Impostos','Resultado Líquido'],pie:['Pessoal','Serviços','Marketing','Tecnologia','Outros']}
};
var charts={};
function fmt(n){return n.toLocaleString('es-ES',{minimumFractionDigits:0});}
function fmtK(n){return (n/1000).toLocaleString('es-ES',{minimumFractionDigits:1})+'K €';}
function getColors(){return isDark?{grid:'rgba(255,255,255,.07)',txt:'#a8b4c8',bg:'#111827'}:{grid:'rgba(0,0,0,.1)',txt:'#3d4466',bg:'#faf7f0'};}
function calcKPIs(sc){
  var s=SCENARIOS[sc];
  var totRev=s.rev.reduce((a,b)=>a+b,0);
  var totCost=s.costs.reduce((a,b)=>a+b,0);
  var ebitda=(totRev-totCost)*0.72;
  var net=(totRev-totCost)*0.55;
  var cf=(totRev-totCost)*0.48;
  return [totRev,ebitda,net/totRev*100,cf];
}
function renderKPIs(){
  var t=TXT[lang]; var vals=calcKPIs(scenario);
  var deltas=['+12.4%','+8.2%','+1.8pp','+15.6%'];
  var ups=[true,true,scenario!==2,true];
  document.getElementById('kpi-grid').innerHTML=t.kpi.map(function(k,i){
    return '<div class="kpi"><div class="kpi-label">'+k+'</div><div class="kpi-val">'+(i===2?vals[i].toFixed(1)+'%':fmtK(vals[i]*1000))+'</div><span class="kpi-delta '+(ups[i]?'up':'dn')+'">'+deltas[i]+'</span></div>';
  }).join('');
}
function buildChart1(){
  var s=SCENARIOS[scenario]; var t=TXT[lang]; var c=getColors(); var m=MONTHS[lang];
  if(charts.c1)charts.c1.destroy();
  charts.c1=new Chart(document.getElementById('ch1'),{type:'line',data:{labels:m,datasets:[
    {label:t.kpi[0],data:s.rev,borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,.12)',fill:true,tension:.4,pointRadius:3},
    {label:t.rows[1],data:s.costs,borderColor:'#5a9fd4',backgroundColor:'rgba(90,159,212,.08)',fill:true,tension:.4,pointRadius:3}
  ]},options:{responsive:true,plugins:{legend:{labels:{color:c.txt,font:{size:11}}}},scales:{x:{ticks:{color:c.txt,font:{size:10}},grid:{color:c.grid}},y:{ticks:{color:c.txt,font:{size:10},callback:function(v){return v+'K'}},grid:{color:c.grid}}}}});
}
function buildChart2(){
  var t=TXT[lang]; var c=getColors();
  if(charts.c2)charts.c2.destroy();
  charts.c2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:t.pie,datasets:[{data:[45,20,12,15,8],backgroundColor:['#c9a84c','#5a9fd4','#a78bfa','#34d399','#f87171'],borderWidth:0,hoverOffset:6}]},options:{responsive:true,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:c.txt,font:{size:10},padding:10}}}}});
}
function buildChart3(){
  var s=SCENARIOS[scenario]; var t=TXT[lang]; var c=getColors(); var m=MONTHS[lang];
  var ebitda=s.rev.map(function(r,i){return r-s.costs[i];});
  if(charts.c3)charts.c3.destroy();
  charts.c3=new Chart(document.getElementById('ch3'),{type:'bar',data:{labels:m,datasets:[{label:'EBITDA',data:ebitda,backgroundColor:ebitda.map(function(v){return v>0?'rgba(201,168,76,.7)':'rgba(248,113,113,.7)';}),borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:c.txt,font:{size:9}},grid:{display:false}},y:{ticks:{color:c.txt,font:{size:9}},grid:{color:c.grid}}}}});
}
function buildChart4(){
  var s=SCENARIOS[scenario]; var c=getColors(); var m=MONTHS[lang];
  var cf=s.rev.map(function(r,i){return (r-s.costs[i])*0.65;});
  if(charts.c4)charts.c4.destroy();
  charts.c4=new Chart(document.getElementById('ch4'),{type:'line',data:{labels:m,datasets:[{data:cf,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.1)',fill:true,tension:.5,pointRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:c.txt,font:{size:9}},grid:{display:false}},y:{ticks:{color:c.txt,font:{size:9}},grid:{color:c.grid}}}}});
}
function buildChart5(){
  var s=SCENARIOS[scenario]; var c=getColors();
  var totRev=s.rev.reduce(function(a,b){return a+b;},0);
  var totCost=s.costs.reduce(function(a,b){return a+b;},0);
  var roe=((totRev-totCost)/totRev*100).toFixed(1);
  document.getElementById('g-val').textContent=roe+'%';
  if(charts.c5)charts.c5.destroy();
  var pct=parseFloat(roe)/40;
  charts.c5=new Chart(document.getElementById('ch5'),{type:'doughnut',data:{datasets:[{data:[pct,1-pct],backgroundColor:['#c9a84c','rgba(255,255,255,.06)'],borderWidth:0}]},options:{circumference:180,rotation:270,cutout:'75%',plugins:{legend:{display:false},tooltip:{enabled:false}},responsive:false}});
}
function buildTable(){
  var s=SCENARIOS[scenario]; var t=TXT[lang];
  function q(arr,q){return arr.slice(q*3,(q+1)*3).reduce(function(a,b){return a+b;},0);}
  var revQ=[q(s.rev,0),q(s.rev,1),q(s.rev,2),q(s.rev,3)];
  var costQ=[q(s.costs,0),q(s.costs,1),q(s.costs,2),q(s.costs,3)];
  var rows=[revQ,costQ.map(function(v){return v*.6;}),revQ.map(function(v,i){return v-costQ[i]*.6;}),costQ.map(function(v){return v*.4;}),revQ.map(function(v,i){return v-costQ[i];}),revQ.map(function(){return -18;}),revQ.map(function(v,i){return v-costQ[i]-18;}),revQ.map(function(v,i){return -(v-costQ[i]-18)*.25;}),revQ.map(function(v,i){return (v-costQ[i]-18)*.75;})];
  document.getElementById('thr').innerHTML=t.thr.map(function(h){return '<th>'+h+'</th>';}).join('');
  document.getElementById('tbd').innerHTML=t.rows.map(function(r,i){
    var tot=rows[i].reduce(function(a,b){return a+b;},0);
    var isNeg=i===1||i===3||i===5||i===7;
    var cls=tot<0?'neg':'pos';
    return '<tr><td style="color:var(--t)">'+r+'</td>'+rows[i].map(function(v){return '<td class="'+(v<0?'neg':'pos')+'">'+fmt(v)+'K</td>';}).join('')+'<td class="'+cls+'"><strong>'+fmt(tot)+'K</strong></td></tr>';
  }).join('');
}
function setScenario(n){
  scenario=n;
  [0,1,2,3].forEach(function(i){document.getElementById('sc'+i).classList.toggle('on',i===n);});
  renderAll();
}
function renderAll(){
  var t=TXT[lang];
  document.getElementById('logo-sub').textContent=t.logoSub;
  document.getElementById('h-title').textContent=t.hTitle;
  document.getElementById('h-sub').textContent=t.hSub;
  [0,1,2,3].forEach(function(i){document.getElementById('sc'+i+'t').textContent=t.sc[i];});
  document.getElementById('ct1').textContent=t.ct1;
  document.getElementById('ct2').textContent=t.ct2;
  document.getElementById('ct3').textContent=t.ct3;
  document.getElementById('ct4').textContent=t.ct4;
  document.getElementById('ct5').textContent=t.ct5;
  document.getElementById('ct6').textContent=t.ct6;
  renderKPIs();
  buildChart1();buildChart2();buildChart3();buildChart4();buildChart5();buildTable();
}
function setL(l){
  lang=l;
  ['es','en','pt'].forEach(function(x){document.getElementById('b-'+x).classList.toggle('on',x===l);});
  renderAll();
}
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  var t=TXT[lang];
  document.getElementById('b-th').innerHTML=(isDark?'☀️ ':'🌙 ')+'<span id="th-lbl">'+(isDark?t.thOff:t.thOn)+'</span>';
  renderAll();
}
renderAll();
</script>
</body></html>
