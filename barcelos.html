<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freguesias de Barcelos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --card: #fff;
    --border: #d6c9b0;
    --text: #1a1410;
    --text-muted: #6b5c4a;
    --accent: #8b6914;
    --accent2: #c4a050;
    --num: #a07830;
    --shadow: 0 2px 12px rgba(100,70,20,0.10);
    --header-bg: #2a1f0e;
    --header-text: #f0e6cc;
    --header-accent: #c4a050;
  }
  [data-theme="dark"] {
    --bg: #080c14;
    --bg2: #0e1320;
    --card: #131926;
    --border: #2a3550;
    --text: #e8e0d0;
    --text-muted: #8898bb;
    --accent: #c4a050;
    --accent2: #e8c870;
    --num: #c4a050;
    --shadow: 0 2px 16px rgba(0,0,0,0.40);
    --header-bg: #0a0e1a;
    --header-text: #e8e0d0;
    --header-accent: #c4a050;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* Ambient orb (dark mode only) */
  [data-theme="dark"] body::before {
    content: '';
    position: fixed;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(196,160,80,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--header-accent), transparent);
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--header-accent);
    line-height: 1.15;
  }
  header p {
    margin-top: 0.5rem;
    font-size: 0.88rem;
    font-weight: 300;
    color: rgba(240,230,204,0.65);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
    max-width: 860px;
    margin: 1.5rem auto 0.5rem;
    padding: 0 1.5rem;
    position: relative;
    z-index: 1;
  }
  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
  }
  .count-badge span {
    color: var(--accent);
    font-weight: 500;
  }

  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .toggle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .toggle-btn svg {
    width: 14px; height: 14px;
    fill: currentColor;
    transition: transform 0.4s;
  }
  .toggle-btn:hover svg { transform: rotate(20deg); }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
    position: relative;
    z-index: 1;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }
  .search-wrap svg {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    fill: var(--text-muted);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow);
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(196,160,80,0.12);
  }
  .search-input::placeholder { color: var(--text-muted); opacity: 0.7; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.6rem;
  }

  .item {
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    box-shadow: var(--shadow);
    transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    animation: fadeUp 0.4s both;
  }
  .item:hover {
    border-color: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(196,160,80,0.15);
  }
  .item.hidden { display: none; }

  .num {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--num);
    font-weight: 500;
    min-width: 1.8rem;
    text-align: right;
    user-select: none;
    opacity: 0.85;
  }
  .name {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 400;
    line-height: 1.35;
    flex: 1;
  }
  .name mark {
    background: rgba(196,160,80,0.28);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    padding: 2rem;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
  }
  footer span { color: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 2rem 1rem 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Freguesias de Barcelos</h1>
  <p>Concelho do Distrito de Braga · Portugal</p>
</header>

<div class="controls">
  <div class="count-badge">Total: <span id="visCount">65</span> de <span>65</span> freguesias</div>
  <button class="toggle-btn" id="themeBtn" onclick="toggleTheme()">
    <svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>
    <span id="themeLabel">Modo escuro</span>
  </button>
</div>

<main>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Filtrar freguesia…" oninput="filterList(this.value)">
  </div>

  <div class="grid" id="grid"></div>
</main>

<footer>Fonte: Divisão Administrativa de Portugal · <span>Barcelos</span> · Distrito de Braga</footer>

<script>
const freguesias = [
  "Abade de Neiva",
  "Aborim",
  "Adães",
  "Airó",
  "Aldreu",
  "Alheira e Igreja Nova",
  "Alvelos",
  "Alvito (São Pedro e São Martinho) e Couto",
  "Arcozelo",
  "Areias",
  "Areias de Vilar e Encourados",
  "Balugães",
  "Barcelinhos",
  "Barcelos",
  "Barqueiros",
  "Cambeses",
  "Campo e Tamel (São Pedro Fins)",
  "Carapeços",
  "Carreira e Fonte Coberta",
  "Carvalhal",
  "Carvalhas",
  "Chorente, Góios, Courel, Pedra Furada e Gueral",
  "Cossourado",
  "Creixomil e Mariz",
  "Cristelo",
  "Durrães e Tregosa",
  "Fornelos",
  "Fragoso",
  "Gamil e Midões",
  "Gilmonde",
  "Lama",
  "Lijó",
  "Macieira de Rates",
  "Manhente",
  "Martim",
  "Milhazes, Vilar de Figos e Faria",
  "Moure",
  "Negreiros e Chavão",
  "Oliveira",
  "Palme",
  "Panque",
  "Paradela",
  "Pereira",
  "Perelhal",
  "Pousa",
  "Quintiães e Aguiar",
  "Remelhe",
  "Roriz",
  "Santa Eugénia de Rio Covo",
  "Santa Eulália de Rio Covo",
  "Santa Maria de Galegos",
  "São Martinho de Galegos",
  "São Martinho de Vila Frescaínha",
  "São Pedro de Vila Frescaínha",
  "São Veríssimo de Tamel",
  "Sequeade e Bastuço (São João e Santo Estêvão)",
  "Silva",
  "Silveiros",
  "Tamel (Santa Leocádia) e Vilar do Monte",
  "Ucha",
  "Várzea",
  "Viatodos, Grimancelos, Minhotães e Monte de Fralães",
  "Vila Boa",
  "Vila Cova e Feitos",
  "Vila Seca"
].sort((a, b) => a.localeCompare(b, 'pt', { sensitivity: 'base' }));

function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function renderList(query = '') {
  const grid = document.getElementById('grid');
  const nq = normalize(query.trim());
  grid.innerHTML = '';
  let count = 0;

  freguesias.forEach((f, i) => {
    const matches = !nq || normalize(f).includes(nq);
    if (!matches) return;
    count++;
    const item = document.createElement('div');
    item.className = 'item';
    item.style.animationDelay = (count * 18) + 'ms';

    let displayName = f;
    if (nq) {
      const nf = normalize(f);
      const idx = nf.indexOf(nq);
      if (idx >= 0) {
        displayName = f.slice(0, idx) + '<mark>' + f.slice(idx, idx + query.length) + '</mark>' + f.slice(idx + query.length);
      }
    }

    item.innerHTML = `<span class="num">${(i + 1).toString().padStart(2,'0')}</span><span class="name">${displayName}</span>`;
    grid.appendChild(item);
  });

  if (count === 0) {
    grid.innerHTML = '<div class="no-results">Nenhuma freguesia encontrada.</div>';
  }
  document.getElementById('visCount').textContent = count;
}

function filterList(val) { renderList(val); }

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeLabel').textContent = isDark ? 'Modo escuro' : 'Modo claro';
  document.getElementById('themeIcon').innerHTML = isDark
    ? '<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}

renderList();
</script>
</body>
</html>
