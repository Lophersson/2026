<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qasleia Travel — Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sand-light:  #F7EDD8;
      --sand-mid:    #DEC49A;
      --brown:       #6B3A22;
      --brown-mid:   #8C4E30;
      --brown-light: #A0623C;
      --brown-dark:  #3E1F0A;
      --bg:          #EDD8BC;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vw, 32px);
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── FONDO: luz solar animada ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 25% 35%, rgba(255,235,200,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 75% 70%, rgba(217,160,144,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 60% 20%, rgba(240,220,180,0.35) 0%, transparent 50%);
      animation: sunDrift 9s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    /* Ondas de arena */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        112deg,
        transparent 0px,
        transparent 42px,
        rgba(107,58,34,0.04) 42px,
        rgba(107,58,34,0.04) 43px
      );
      animation: sandWave 7s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes sunDrift {
      0%   { opacity: 0.8; transform: translate(0,0) scale(1); }
      25%  { opacity: 1;   transform: translate(40px,-25px) scale(1.06); }
      60%  { opacity: 0.85; transform: translate(-25px,18px) scale(0.97); }
      100% { opacity: 0.95; transform: translate(20px,-12px) scale(1.04); }
    }
    @keyframes sandWave {
      from { background-position: 0 0; }
      to   { background-position: 220px 110px; }
    }

    /* ── CARD: cuadrada y responsive ── */
    .card {
      position: relative;
      /* Cuadrado: usa el menor entre 90vw y 90vh, con máximo de 520px */
      width:  min(90vw, 90vh, 520px);
      height: min(90vw, 90vh, 520px);
      background: radial-gradient(ellipse at 50% 25%, #F5E8CE 0%, #EDD4B0 55%, #E0C598 100%);
      border: 1px solid rgba(107,58,34,0.25);
      box-shadow:
        0 2px 40px rgba(107,58,34,0.12),
        inset 0 1px 0 rgba(255,245,225,0.6);
      animation: fadeCard 1.6s ease both;
      z-index: 1;
      overflow: hidden;
      /* Flex para centrar el contenido interno */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 6%, 56px) clamp(20px, 8%, 64px);
    }

    /* Luz que barre la tarjeta */
    .card-glow {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        118deg,
        transparent 0%,
        rgba(255,245,220,0.25) 30%,
        rgba(255,235,195,0.40) 50%,
        rgba(217,160,144,0.15) 68%,
        transparent 100%
      );
      animation: sunSweep 6s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes sunSweep {
      0%   { transform: translateX(-70%) skewX(-8deg); opacity: 0.4; }
      100% { transform: translateX(90%) skewX(-8deg); opacity: 1; }
    }

    /* Corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: clamp(18px, 4%, 28px);
      height: clamp(18px, 4%, 28px);
      border-color: var(--brown);
      border-style: solid;
      opacity: 0;
      animation: fadeCorner 1s 1.2s ease forwards;
    }
    .card::before { top: 14px; left: 14px; border-width: 1.5px 0 0 1.5px; }
    .card::after  { bottom: 14px; right: 14px; border-width: 0 1.5px 1.5px 0; }

    .corner-tr, .corner-bl {
      position: absolute;
      width: clamp(18px, 4%, 28px);
      height: clamp(18px, 4%, 28px);
      border-color: var(--brown);
      border-style: solid;
      opacity: 0;
      animation: fadeCorner 1s 1.2s ease forwards;
      z-index: 2;
    }
    .corner-tr { top: 14px; right: 14px; border-width: 1.5px 1.5px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 1.5px 1.5px; }

    /* ── INNER CONTENT (z-index sobre el glow) ── */
    .inner { 
      position: relative; 
      z-index: 2; 
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── TOP RULE ── */
    .top-rule {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: clamp(16px, 4%, 28px);
      opacity: 0;
      animation: fadeUp 0.8s 0.3s ease forwards;
    }
    .top-rule span, .bottom-rule span {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--brown-mid), transparent);
    }
    .diamond-sm {
      width: 5px; height: 5px;
      background: var(--brown);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── EMBLEM ── */
    .emblem {
      display: flex;
      justify-content: center;
      margin-bottom: clamp(12px, 3%, 22px);
      opacity: 0;
      animation: fadeUp 0.9s 0.5s ease forwards;
    }
    .emblem svg {
      width:  clamp(60px, 14vmin, 90px);
      height: clamp(60px, 14vmin, 90px);
      filter: drop-shadow(0 2px 8px rgba(107,58,34,0.25));
    }

    /* ── WORDMARK ── */
    .wordmark {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s 0.75s ease forwards;
      width: 100%;
    }
    .brand-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 7vmin, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      line-height: 1;
      background: linear-gradient(135deg, #6B3A22 0%, #8C4E30 35%, #3E1F0A 60%, #6B3A22 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      background-size: 250% 250%;
      animation: textShimmer 6s ease-in-out infinite alternate;
      white-space: nowrap;
    }
    @keyframes textShimmer {
      0%   { background-position: 0% 50%; filter: brightness(1); }
      50%  { background-position: 100% 50%; filter: brightness(1.15); }
      100% { background-position: 0% 50%; filter: brightness(1); }
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: clamp(10px, 2.5%, 18px) 0 clamp(8px, 2%, 14px);
      opacity: 0;
      animation: fadeUp 0.8s 1s ease forwards;
      width: 100%;
    }
    .divider-line {
      width: clamp(40px, 10%, 80px); height: 1px;
      background: linear-gradient(to right, transparent, var(--brown-mid));
    }
    .divider-line.rev { background: linear-gradient(to left, transparent, var(--brown-mid)); }
    .diamond {
      width: 7px; height: 7px;
      border: 1.5px solid var(--brown);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .diamond.filled { background: var(--brown); }

    /* ── TRAVEL TAG ── */
    .travel-tag {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s 1.1s ease forwards;
    }
    .travel-word {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.8vmin, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.5em;
      color: var(--brown-mid);
      text-transform: uppercase;
    }

    /* ── TAGLINE ── */
    .tagline {
      text-align: center;
      margin-top: clamp(10px, 2.5%, 20px);
      opacity: 0;
      animation: fadeUp 0.8s 1.35s ease forwards;
      width: 100%;
    }
    .tagline p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.85rem, 1vmin, 0.5rem);
      letter-spacing: 0.1em;
      color: rgba(107,58,34,0.55);
      white-space: nowrap;
    }

    /* ── BOTTOM RULE ── */
    .bottom-rule {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-top: clamp(16px, 4%, 28px);
      opacity: 0;
      animation: fadeUp 0.8s 1.5s ease forwards;
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeCard {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeCorner {
      from { opacity: 0; }
      to   { opacity: 0.65; }
    }
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .ring-outer {
      animation: rotateSlow 18s linear infinite;
      transform-origin: 45px 45px;
    }

  </style>
</head>
<body>

  <div class="card">
    <div class="card-glow"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>

    <div class="inner">

      <div class="top-rule">
        <span></span>
        <div class="diamond-sm"></div>
        <div class="diamond-sm"></div>
        <div class="diamond-sm"></div>
        <span></span>
      </div>

      <div class="emblem">
        <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="ring-outer">
            <circle cx="45" cy="6"  r="1.2" fill="#8C4E30" opacity="0.5"/>
            <circle cx="45" cy="84" r="1.2" fill="#8C4E30" opacity="0.5"/>
            <circle cx="6"  cy="45" r="1.2" fill="#8C4E30" opacity="0.5"/>
            <circle cx="84" cy="45" r="1.2" fill="#8C4E30" opacity="0.5"/>
            <circle cx="17" cy="17" r="1"   fill="#6B3A22" opacity="0.4"/>
            <circle cx="73" cy="73" r="1"   fill="#6B3A22" opacity="0.4"/>
            <circle cx="73" cy="17" r="1"   fill="#6B3A22" opacity="0.4"/>
            <circle cx="17" cy="73" r="1"   fill="#6B3A22" opacity="0.4"/>
          </g>
          <polygon points="45,10 66,18 80,36 80,54 66,72 45,80 24,72 10,54 10,36 24,18"
            fill="none" stroke="#8C4E30" stroke-width="0.7" opacity="0.45"/>
          <polygon points="45,22 64,45 45,68 26,45"
            fill="rgba(107,58,34,0.06)" stroke="#6B3A22" stroke-width="0.9" opacity="0.8"/>
          <line x1="45" y1="22" x2="45" y2="68" stroke="#8C4E30" stroke-width="0.5" opacity="0.25"/>
          <line x1="26" y1="45" x2="64" y2="45" stroke="#8C4E30" stroke-width="0.5" opacity="0.25"/>
          <text x="45" y="52" text-anchor="middle"
            font-family="Cinzel Decorative, serif" font-size="22" font-weight="700"
            fill="url(#brownGrad)" opacity="0.92">Q</text>
          <rect x="43.5" y="8.5" width="3" height="3" fill="#6B3A22" transform="rotate(45 45 10)" opacity="0.8"/>
          <rect x="43.5" y="78.5" width="3" height="3" fill="#6B3A22" transform="rotate(45 45 80)" opacity="0.8"/>
          <defs>
            <linearGradient id="brownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#A0623C"/>
              <stop offset="40%"  stop-color="#6B3A22"/>
              <stop offset="75%"  stop-color="#3E1F0A"/>
              <stop offset="100%" stop-color="#8C4E30"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <div class="wordmark">
        <div class="brand-name">Qasleia</div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="diamond"></div>
        <div class="diamond filled"></div>
        <div class="diamond"></div>
        <div class="divider-line rev"></div>
      </div>

      <div class="travel-tag">
        <span class="travel-word">Travel</span>
      </div>

      <div class="tagline">
        <p>Where the extraordinary becomes your ordinary</p>
      </div>

      <div class="bottom-rule">
        <span></span>
        <div class="diamond-sm"></div>
        <div class="diamond-sm"></div>
        <div class="diamond-sm"></div>
        <span></span>
      </div>

    </div><!-- /inner -->
  </div>


</body>
</html>
