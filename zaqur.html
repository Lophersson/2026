<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel — Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:     #0D0B2B;
      --gold:    #C9A84C;
      --gold2:   #E8CC7A;
      --copper:  #8B3A2A;
      --ivory:   #F5F0E8;
      --mist:    #B8B0A2;
    }

    body {
      background: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* ── OUTER CARD ── */
    .card {
      position: relative;
      width: 680px;
      padding: 70px 80px 60px;
      background: radial-gradient(ellipse at 50% 20%, #1a1540 0%, #0D0B2B 65%);
      border: 1px solid rgba(201,168,76,0.25);
      animation: fadeCard 1.6s ease both;
    }

    /* Corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0;
      animation: fadeCorner 1s 1.2s ease forwards;
    }
    .card::before { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

    .corner-tr, .corner-bl {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0;
      animation: fadeCorner 1s 1.2s ease forwards;
    }
    .corner-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }

    /* ── TOP LINE ── */
    .top-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.8s 0.3s ease forwards;
    }
    .top-rule span {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .top-rule .diamond-sm {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── EMBLEM ── */
    .emblem {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s ease forwards;
    }
    .emblem svg {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.35));
    }

    /* ── WORDMARK ── */
    .wordmark {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s 0.75s ease forwards;
    }
    .brand-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      line-height: 1;
      background: linear-gradient(135deg, #C9A84C 0%, #E8CC7A 45%, #C9A84C 70%, #A07830 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 18px 0 16px;
      opacity: 0;
      animation: fadeUp 0.8s 1s ease forwards;
    }
    .divider-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider-line.rev {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .diamond {
      width: 7px; height: 7px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .diamond.filled { background: var(--gold); }

    /* ── TRAVEL TAG ── */
    .travel-tag {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s 1.1s ease forwards;
    }
    .travel-word {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.55em;
      color: var(--mist);
      text-transform: uppercase;
    }

    /* ── TAGLINE ── */
    .tagline {
      text-align: center;
      margin-top: 22px;
      opacity: 0;
      animation: fadeUp 0.8s 1.35s ease forwards;
    }
    .tagline p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      color: rgba(245,240,232,0.55);
    }

    /* ── BOTTOM LINE ── */
    .bottom-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.8s 1.5s ease forwards;
    }
    .bottom-rule span {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeCard {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeCorner {
      from { opacity: 0; }
      to   { opacity: 0.7; }
    }
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* SVG ring animation */
    .ring-outer {
      animation: rotateSlow 18s linear infinite;
      transform-origin: 45px 45px;
    }

    /* Ambient glow */
    .glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 200px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="glow"></div>

    <!-- Top rule -->
    <div class="top-rule">
      <span></span>
      <div class="diamond-sm"></div>
      <div class="diamond-sm"></div>
      <div class="diamond-sm"></div>
      <span></span>
    </div>

    <!-- Emblem SVG -->
    <div class="emblem">
      <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer rotating ring of dots -->
        <g class="ring-outer">
          <circle cx="45" cy="6"  r="1.2" fill="#C9A84C" opacity="0.6"/>
          <circle cx="45" cy="84" r="1.2" fill="#C9A84C" opacity="0.6"/>
          <circle cx="6"  cy="45" r="1.2" fill="#C9A84C" opacity="0.6"/>
          <circle cx="84" cy="45" r="1.2" fill="#C9A84C" opacity="0.6"/>
          <circle cx="17" cy="17" r="1"   fill="#C9A84C" opacity="0.4"/>
          <circle cx="73" cy="73" r="1"   fill="#C9A84C" opacity="0.4"/>
          <circle cx="73" cy="17" r="1"   fill="#C9A84C" opacity="0.4"/>
          <circle cx="17" cy="73" r="1"   fill="#C9A84C" opacity="0.4"/>
        </g>

        <!-- Outer octagon frame -->
        <polygon
          points="45,10 66,18 80,36 80,54 66,72 45,80 24,72 10,54 10,36 24,18"
          fill="none"
          stroke="#C9A84C"
          stroke-width="0.6"
          opacity="0.5"
        />

        <!-- Inner diamond -->
        <polygon
          points="45,22 64,45 45,68 26,45"
          fill="none"
          stroke="#C9A84C"
          stroke-width="0.8"
          opacity="0.8"
        />

        <!-- Inner diamond fill subtle -->
        <polygon
          points="45,22 64,45 45,68 26,45"
          fill="rgba(201,168,76,0.04)"
        />

        <!-- Cross lines inside diamond -->
        <line x1="45" y1="22" x2="45" y2="68" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
        <line x1="26" y1="45" x2="64" y2="45" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

        <!-- Center emblem: stylized P -->
        <text
          x="45" y="52"
          text-anchor="middle"
          font-family="Cinzel Decorative, serif"
          font-size="22"
          font-weight="700"
          fill="url(#goldGrad)"
          opacity="0.95"
        >Z</text> <!-- CAMBIAR INICIAL -->

        <!-- Corner accent diamonds on octagon -->
        <rect x="43.5" y="8.5" width="3" height="3" fill="#C9A84C" transform="rotate(45 45 10)" opacity="0.9"/>
        <rect x="43.5" y="78.5" width="3" height="3" fill="#C9A84C" transform="rotate(45 45 80)" opacity="0.9"/>

        <defs>
          <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#E8CC7A"/>
            <stop offset="50%"  stop-color="#C9A84C"/>
            <stop offset="100%" stop-color="#A07830"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Brand name -->
    <div class="wordmark">
      <div class="brand-name">Zaqur</div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="diamond"></div>
      <div class="diamond filled"></div>
      <div class="diamond"></div>
      <div class="divider-line rev"></div>
    </div>

    <!-- Travel -->
    <div class="travel-tag">
      <span class="travel-word">Travel</span>
    </div>

    <!-- Tagline -->
    <div class="tagline">
      <p>Where the extraordinary becomes your ordinary</p>
    </div>

    <!-- Bottom rule -->
    <div class="bottom-rule">
      <span></span>
      <div class="diamond-sm" style="width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;"></div>
      <div class="diamond-sm" style="width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;"></div>
      <div class="diamond-sm" style="width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;"></div>
      <span></span>
    </div>

  </div>

</body>
</html>
