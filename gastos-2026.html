<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Suite Presupuestos & Gastos 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b11;--bg2:#0e1520;--bg3:#162030;--s:#1c2b3e;--b:#263a52;--a:#c9a84c;--a2:#e8c96e;--as:rgba(201,168,76,.12);--t:#e8edf5;--t2:#a8b4c8;--t3:#5a6a84;--r:14px;--ff:'Cormorant Garamond',serif;--fb:'Outfit',sans-serif;--fm:'DM Mono',monospace;--green:#4ade80;--red:#f87171;--amber:#fbbf24}
[data-theme=light]{--bg:#eee8d8;--bg2:#f8f4ea;--bg3:#fff;--s:#fff;--b:#d8cfb8;--a:#8b6914;--a2:#a07820;--as:rgba(139,105,20,.1);--t:#1a1a2e;--t2:#3d4466;--t3:#8a8aaa}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100vh}
#bar{display:flex;justify-content:space-between;align-items:center;padding:10px 28px;background:var(--bg2);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:99;flex-wrap:wrap;gap:8px}
.logo{font-family:var(--ff);font-size:1.2rem;font-weight:700;color:var(--a)}
.logo span{font-size:.63rem;color:var(--t3);font-family:var(--fb);letter-spacing:.09em;text-transform:uppercase;display:block;margin-top:-3px}
.btn{padding:5px 12px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--t2);font-family:var(--fb);font-size:.74rem;cursor:pointer;transition:all .2s}
.btn:hover,.btn.on{background:var(--a);border-color:var(--a);color:#070b11;font-weight:600}
#wrap{max-width:1200px;margin:0 auto;padding:26px 20px 60px}
.pg-title{font-family:var(--ff);font-size:2rem;font-weight:700;color:var(--a);margin-bottom:4px}
.pg-sub{font-size:.79rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px}
.tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--b);padding-bottom:12px;flex-wrap:wrap}
.tab{padding:7px 18px;border-radius:8px 8px 0 0;border:1px solid transparent;background:transparent;color:var(--t2);font-family:var(--fb);font-size:.8rem;cursor:pointer;transition:all .2s;margin-bottom:-1px}
.tab:hover{color:var(--a)}
.tab.on{background:var(--bg2);border-color:var(--b);border-bottom-color:var(--bg2);color:var(--a);font-weight:600}
.tab-content{display:none}.tab-content.on{display:block}
/* NOMINA */
.nom-grid{display:grid;grid-template-columns:400px 1fr;gap:22px;align-items:start}
.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:22px;margin-bottom:18px}
.card-title{font-family:var(--ff);font-size:1.05rem;font-weight:600;color:var(--a);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--b)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.7rem;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;color:var(--t);font-family:var(--fm);font-size:.85rem;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--a)}
.field input[type=range]{padding:3px 0;background:transparent;border:none;accent-color:var(--a)}
.range-row{display:flex;justify-content:space-between;font-size:.69rem;color:var(--t3);margin-top:3px}
.nom-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:8px;margin-bottom:6px;background:var(--bg3)}
.nom-lbl{font-size:.8rem;color:var(--t2)}
.nom-val{font-family:var(--fm);font-size:.88rem;color:var(--a);font-weight:500}
.nom-val.neg{color:var(--red)}.nom-val.green{color:var(--green)}
.nom-divider{border:none;border-top:1px solid var(--b);margin:8px 0}
.nom-total{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--as);border:1px solid var(--a);border-radius:10px;margin-top:4px}
.nom-total-lbl{font-size:.88rem;font-weight:600;color:var(--t)}
.nom-total-val{font-family:var(--fm);font-size:1.4rem;color:var(--a);font-weight:500}
/* PRESUPUESTO */
.budget-header{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.bh-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:16px;text-align:center}
.bh-lbl{font-size:.68rem;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.bh-val{font-family:var(--fm);font-size:1.3rem;color:var(--a)}
.prog-row{margin-bottom:14px}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-cat{font-size:.82rem;font-weight:500;color:var(--t)}
.prog-vals{font-family:var(--fm);font-size:.78rem;color:var(--t2)}
.prog-bar-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-ok{background:var(--green)}.fill-warn{background:var(--amber)}.fill-over{background:var(--red)}
/* GASTOS */
.expense-form{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;margin-bottom:20px;align-items:end}
.add-btn{padding:9px 18px;background:var(--a);border:none;border-radius:8px;color:#070b11;font-family:var(--fb);font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.add-btn:hover{opacity:.85}
.exp-list{display:flex;flex-direction:column;gap:8px}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:var(--bg3);border:1px solid var(--b);border-radius:10px;transition:border-color .2s}
.exp-item:hover{border-color:var(--a)}
.exp-l{display:flex;gap:10px;align-items:center}
.exp-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.exp-name{font-size:.85rem;color:var(--t);font-weight:500}
.exp-date{font-size:.72rem;color:var(--t3)}
.exp-r{display:flex;gap:14px;align-items:center}
.exp-amount{font-family:var(--fm);font-size:.9rem;color:var(--a);font-weight:500}
.del-btn{border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:.85rem;padding:2px 6px;border-radius:4px;transition:all .2s}
.del-btn:hover{color:var(--red);background:rgba(248,113,113,.1)}
.cat-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
.empty-state{text-align:center;padding:40px;color:var(--t3);font-size:.88rem}
.summary-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.chip{display:inline-flex;flex-direction:column;padding:8px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;min-width:110px}
.chip-lbl{font-size:.63rem;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.chip-val{font-family:var(--fm);font-size:.95rem;color:var(--a)}
@media(max-width:800px){.nom-grid{grid-template-columns:1fr}.budget-header{grid-template-columns:repeat(2,1fr)}.expense-form{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.budget-header{grid-template-columns:1fr 1fr}.expense-form{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="bar">
  <div>
    <div class="logo">Suite 2026<span id="logo-sub">Presupuestos & Gastos</span></div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn on" id="b-es" onclick="setL('es')">🇪🇸 ES</button>
    <button class="btn" id="b-en" onclick="setL('en')">🇬🇧 EN</button>
    <button class="btn" id="b-pt" onclick="setL('pt')">🇵🇹 PT</button>
    <button class="btn" id="b-th" onclick="toggleTheme()">☀️ <span id="th-lbl">Claro</span></button>
  </div>
</div>
<div id="wrap">
  <div class="pg-title" id="pg-title">Suite Presupuestos & Gastos 2026</div>
  <div class="pg-sub" id="pg-sub">Nómina · Presupuesto · Gastos · Retenciones SS / IRPF</div>
  <div class="tabs">
    <button class="tab on" onclick="showTab('nomina')"><span id="tab0">💼 Nómina</span></button>
    <button class="tab" onclick="showTab('presupuesto')"><span id="tab1">📊 Presupuesto</span></button>
    <button class="tab" onclick="showTab('gastos')"><span id="tab2">💳 Gastos</span></button>
  </div>
  <!-- NOMINA -->
  <div class="tab-content on" id="t-nomina">
    <div class="nom-grid">
      <div>
        <div class="card">
          <div class="card-title" id="nom-ct">Configuración de Nómina</div>
          <div class="field"><label id="lbl-sb">Salario Bruto Mensual (€)</label>
            <input type="range" id="inp-sb" value="2000" min="800" max="8000" step="50" oninput="syncSb(this.value);calcNom()">
            <div class="range-row"><span>800 €</span><span id="sb-disp" style="color:var(--a);font-family:var(--fm);font-weight:600">2.000 €</span><span>8.000 €</span></div>
          </div>
          <div class="field"><label id="lbl-pagas">Tipo de Nómina</label>
            <select id="inp-pagas" onchange="calcNom()">
              <option id="pg12" value="12">12 pagas</option><option id="pg14" value="14" selected>14 pagas (incluye extra)</option>
            </select>
          </div>
          <div class="field"><label id="lbl-irpf">Retención IRPF (%)</label>
            <input type="range" id="inp-irpf" value="16" min="0" max="45" step="0.5" oninput="syncIrpf(this.value);calcNom()">
            <div class="range-row"><span>0%</span><span id="irpf-disp" style="color:var(--a);font-family:var(--fm);font-weight:600">16%</span><span>45%</span></div>
          </div>
          <div class="field"><label id="lbl-ss">Cotización SS Empleado (%)</label>
            <input type="number" id="inp-ss" value="6.35" min="0" max="10" step="0.05" oninput="calcNom()">
          </div>
          <div class="field"><label id="lbl-otros">Otras Deducciones (€)</label>
            <input type="number" id="inp-otros" value="0" min="0" step="10" oninput="calcNom()">
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title" id="nom-ct2">Desglose de Nómina</div>
          <div id="nom-rows"></div>
        </div>
        <div class="card">
          <div class="card-title" id="nom-ct3">Coste Empresa Anual</div>
          <div id="nom-empresa"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- PRESUPUESTO -->
  <div class="tab-content" id="t-presupuesto">
    <div class="budget-header" id="budget-kpis"></div>
    <div class="card">
      <div class="card-title" id="bud-ct">Presupuesto Mensual por Categorías</div>
      <div id="budget-cats"></div>
    </div>
  </div>
  <!-- GASTOS -->
  <div class="tab-content" id="t-gastos">
    <div class="summary-chips" id="exp-summary"></div>
    <div class="card">
      <div class="card-title" id="exp-ct">Registro de Gastos</div>
      <div class="expense-form">
        <div class="field" style="margin:0"><label id="lbl-expdesc">Concepto</label><input type="text" id="exp-desc" placeholder="Ej: Supermercado"></div>
        <div class="field" style="margin:0"><label id="lbl-expamt">Importe (€)</label><input type="number" id="exp-amt" placeholder="0.00" step="0.01"></div>
        <div class="field" style="margin:0"><label id="lbl-expcat">Categoría</label>
          <select id="exp-cat">
            <option value="alimentacion">🛒 Alimentación</option><option value="transporte">🚗 Transporte</option>
            <option value="vivienda">🏠 Vivienda</option><option value="ocio">🎭 Ocio</option>
            <option value="salud">💊 Salud</option><option value="ropa">👕 Ropa</option>
            <option value="educacion">📚 Educación</option><option value="otros">📦 Otros</option>
          </select>
        </div>
        <button class="add-btn" onclick="addExpense()" id="btn-add">+ Añadir</button>
      </div>
      <div class="exp-list" id="exp-list"></div>
    </div>
  </div>
</div>
<script>
var isDark=true,lang='es';
var expenses=JSON.parse(localStorage.getItem('gastos26')||'[]');
var CAT_COLORS={alimentacion:'#c9a84c',transporte:'#60a5fa',vivienda:'#a78bfa',ocio:'#34d399',salud:'#f87171',ropa:'#fb923c',educacion:'#e879f9',otros:'#94a3b8'};
var BUDGET_DEF={alimentacion:400,transporte:150,vivienda:700,ocio:200,salud:80,ropa:100,educacion:60,otros:100};
var TXT={
  es:{logoSub:'Presupuestos & Gastos',pgTitle:'Suite Presupuestos & Gastos 2026',pgSub:'Nómina · Presupuesto · Gastos · Retenciones SS / IRPF',tabs:['💼 Nómina','📊 Presupuesto','💳 Gastos'],nomCt:'Configuración de Nómina',nomCt2:'Desglose de Nómina',nomCt3:'Coste Empresa Anual',lblSb:'Salario Bruto Mensual (€)',lblPagas:'Tipo de Nómina',pagas:['12 pagas','14 pagas (incluye extra)'],lblIrpf:'Retención IRPF (%)',lblSs:'Cotización SS Empleado (%)',lblOtros:'Otras Deducciones (€)',
  nomLabels:['Salario Bruto','(-) Cotización SS','(-) Retención IRPF','(-) Otras deducciones','Salario Neto'],
  empLabels:['Salario Bruto Anual','(+) SS Empresa (~23.6%)','(+) Desempleo (5.5%)','(+) FOGASA (0.2%)','Coste Total Empresa'],
  budCt:'Presupuesto Mensual por Categorías',budKpis:['Ingresos','Presupuestado','Gastado','Disponible'],
  cats:{alimentacion:'🛒 Alimentación',transporte:'🚗 Transporte',vivienda:'🏠 Vivienda',ocio:'🎭 Ocio',salud:'💊 Salud',ropa:'👕 Ropa',educacion:'📚 Educación',otros:'📦 Otros'},
  expCt:'Registro de Gastos',lblExpDesc:'Concepto',lblExpAmt:'Importe (€)',lblExpCat:'Categoría',btnAdd:'+ Añadir',
  expSum:['Total Gastado','Este Mes','Nº Gastos','Mayor Gasto'],emptyExp:'No hay gastos registrados. ¡Añade tu primer gasto!',
  thOn:'Oscuro',thOff:'Claro'},
  en:{logoSub:'Budgets & Expenses',pgTitle:'Budget & Expenses Suite 2026',pgSub:'Payroll · Budget · Expenses · SS / IRPF Withholdings',tabs:['💼 Payroll','📊 Budget','💳 Expenses'],nomCt:'Payroll Configuration',nomCt2:'Payroll Breakdown',nomCt3:'Annual Employer Cost',lblSb:'Gross Monthly Salary (€)',lblPagas:'Payroll Type',pagas:['12 payments','14 payments (incl. bonuses)'],lblIrpf:'IRPF Withholding (%)',lblSs:'Employee SS Contribution (%)',lblOtros:'Other Deductions (€)',
  nomLabels:['Gross Salary','(-) SS Contribution','(-) IRPF Withholding','(-) Other deductions','Net Salary'],
  empLabels:['Annual Gross Salary','(+) Employer SS (~23.6%)','(+) Unemployment (5.5%)','(+) FOGASA (0.2%)','Total Employer Cost'],
  budCt:'Monthly Budget by Category',budKpis:['Income','Budgeted','Spent','Available'],
  cats:{alimentacion:'🛒 Food',transporte:'🚗 Transport',vivienda:'🏠 Housing',ocio:'🎭 Leisure',salud:'💊 Health',ropa:'👕 Clothing',educacion:'📚 Education',otros:'📦 Others'},
  expCt:'Expense Register',lblExpDesc:'Description',lblExpAmt:'Amount (€)',lblExpCat:'Category',btnAdd:'+ Add',
  expSum:['Total Spent','This Month','No. Expenses','Largest'],emptyExp:'No expenses yet. Add your first expense!',
  thOn:'Dark',thOff:'Light'},
  pt:{logoSub:'Orçamentos & Despesas',pgTitle:'Suite Orçamentos & Despesas 2026',pgSub:'Vencimento · Orçamento · Despesas · Retenções SS / IRS',tabs:['💼 Vencimento','📊 Orçamento','💳 Despesas'],nomCt:'Configuração do Vencimento',nomCt2:'Detalhe do Vencimento',nomCt3:'Custo Empresa Anual',lblSb:'Salário Bruto Mensal (€)',lblPagas:'Tipo de Pagamento',pagas:['12 pagamentos','14 pagamentos (inclui subsídios)'],lblIrpf:'Retenção IRS (%)',lblSs:'Contribuição SS Trabalhador (%)',lblOtros:'Outras Deduções (€)',
  nomLabels:['Salário Bruto','(-) Contribuição SS','(-) Retenção IRS','(-) Outras deduções','Salário Líquido'],
  empLabels:['Salário Bruto Anual','(+) SS Empresa (~23.6%)','(+) Desemprego (5.5%)','(+) FOGASA (0.2%)','Custo Total Empresa'],
  budCt:'Orçamento Mensal por Categorias',budKpis:['Rendimento','Orçamentado','Gasto','Disponível'],
  cats:{alimentacion:'🛒 Alimentação',transporte:'🚗 Transporte',vivienda:'🏠 Habitação',ocio:'🎭 Lazer',salud:'💊 Saúde',ropa:'👕 Roupa',educacion:'📚 Educação',outros:'📦 Outros'},
  expCt:'Registo de Despesas',lblExpDesc:'Descrição',lblExpAmt:'Valor (€)',lblExpCat:'Categoria',btnAdd:'+ Adicionar',
  expSum:['Total Gasto','Este Mês','Nº Despesas','Maior Despesa'],emptyExp:'Sem despesas registadas. Adicione a primeira despesa!',
  thOn:'Escuro',thOff:'Claro'}
};
function fmt(n){return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmt0(n){return n.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0});}
function syncSb(v){document.getElementById('sb-disp').textContent=parseFloat(v).toLocaleString('es-ES',{minimumFractionDigits:0})+' €';}
function syncIrpf(v){document.getElementById('irpf-disp').textContent=parseFloat(v).toFixed(1)+'%';}
function showTab(id){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('on');});
  document.getElementById('t-'+id).classList.add('on');
  event.currentTarget.classList.add('on');
}
function calcNom(){
  var t=TXT[lang];
  var sb=parseFloat(document.getElementById('inp-sb').value)||0;
  var pagas=parseInt(document.getElementById('inp-pagas').value)||14;
  var irpfPct=parseFloat(document.getElementById('inp-irpf').value)||0;
  var ssPct=parseFloat(document.getElementById('inp-ss').value)||6.35;
  var otros=parseFloat(document.getElementById('inp-otros').value)||0;
  var ss=sb*ssPct/100;
  var irpf=sb*irpfPct/100;
  var neto=sb-ss-irpf-otros;
  var vals=[sb,-ss,-irpf,-otros,neto];
  var isNeg=[false,true,true,true,false];
  var rows=document.getElementById('nom-rows');
  rows.innerHTML=t.nomLabels.map(function(l,i){
    if(i===4){return '<hr class="nom-divider"><div class="nom-total"><span class="nom-total-lbl">'+l+'</span><span class="nom-total-val">'+fmt(vals[i])+' €</span></div>';}
    return '<div class="nom-row"><span class="nom-lbl">'+l+'</span><span class="nom-val '+(isNeg[i]?'neg':'')+'">'+fmt(vals[i])+' €</span></div>';
  }).join('');
  var sbAnual=sb*pagas;
  var ssEmpresa=sbAnual*0.236;
  var paro=sbAnual*0.055;
  var fogasa=sbAnual*0.002;
  var costeTotal=sbAnual+ssEmpresa+paro+fogasa;
  var empVals=[sbAnual,ssEmpresa,paro,fogasa,costeTotal];
  document.getElementById('nom-empresa').innerHTML=t.empLabels.map(function(l,i){
    if(i===4){return '<hr class="nom-divider"><div class="nom-total"><span class="nom-total-lbl">'+l+'</span><span class="nom-total-val">'+fmt(empVals[i])+' €</span></div>';}
    return '<div class="nom-row"><span class="nom-lbl">'+l+'</span><span class="nom-val '+(i>0?'neg':'')+'">'+fmt(empVals[i])+' €</span></div>';
  }).join('');
  renderBudget(neto);
}
function renderBudget(neto){
  var t=TXT[lang];
  var totalBudget=Object.values(BUDGET_DEF).reduce(function(a,b){return a+b;},0);
  var totalSpent=Object.keys(BUDGET_DEF).reduce(function(acc,cat){
    return acc+expenses.filter(function(e){return e.cat===cat;}).reduce(function(a,b){return a+b.amount;},0);
  },0);
  var available=neto-totalSpent;
  var kpis=[neto,totalBudget,totalSpent,available];
  document.getElementById('budget-kpis').innerHTML=t.budKpis.map(function(k,i){
    var cls=i===3&&available<0?'color:var(--red)':'';
    return '<div class="bh-card"><div class="bh-lbl">'+k+'</div><div class="bh-val" style="'+cls+'">'+fmt(kpis[i])+' €</div></div>';
  }).join('');
  document.getElementById('budget-cats').innerHTML=Object.keys(BUDGET_DEF).map(function(cat){
    var budget=BUDGET_DEF[cat];
    var spent=expenses.filter(function(e){return e.cat===cat;}).reduce(function(a,b){return a+b.amount;},0);
    var pct=Math.min(spent/budget*100,100);
    var cls=pct>100?'fill-over':pct>80?'fill-warn':'fill-ok';
    var catName=(t.cats[cat]||cat);
    return '<div class="prog-row"><div class="prog-header"><span class="prog-cat">'+catName+'</span><span class="prog-vals">'+fmt(spent)+' / '+fmt(budget)+' €</span></div><div class="prog-bar-bg"><div class="prog-bar-fill '+cls+'" style="width:'+pct+'%"></div></div></div>';
  }).join('');
}
function addExpense(){
  var desc=document.getElementById('exp-desc').value.trim();
  var amt=parseFloat(document.getElementById('exp-amt').value);
  var cat=document.getElementById('exp-cat').value;
  if(!desc||!amt||amt<=0)return;
  var now=new Date();
  expenses.push({id:Date.now(),desc:desc,amount:amt,cat:cat,date:now.toLocaleDateString('es-ES')});
  localStorage.setItem('gastos26',JSON.stringify(expenses));
  document.getElementById('exp-desc').value='';
  document.getElementById('exp-amt').value='';
  renderExpenses();
}
function delExpense(id){
  expenses=expenses.filter(function(e){return e.id!==id;});
  localStorage.setItem('gastos26',JSON.stringify(expenses));
  renderExpenses();
}
function renderExpenses(){
  var t=TXT[lang];
  var total=expenses.reduce(function(a,b){return a+b.amount;},0);
  var now=new Date();
  var thisMo=expenses.filter(function(e){var p=e.date.split('/');return parseInt(p[1])===now.getMonth()+1&&parseInt(p[2])===now.getFullYear();}).reduce(function(a,b){return a+b.amount;},0);
  var maxAmt=expenses.length?Math.max.apply(null,expenses.map(function(e){return e.amount;})):0;
  document.getElementById('exp-summary').innerHTML=[total,thisMo,expenses.length,maxAmt].map(function(v,i){
    return '<div class="chip"><span class="chip-lbl">'+t.expSum[i]+'</span><span class="chip-val">'+(i===2?v:fmt(v)+' €')+'</span></div>';
  }).join('');
  var listEl=document.getElementById('exp-list');
  if(!expenses.length){listEl.innerHTML='<div class="empty-state">'+t.emptyExp+'</div>';return;}
  listEl.innerHTML=expenses.slice().reverse().map(function(e){
    var color=CAT_COLORS[e.cat]||'#94a3b8';
    var catName=(t.cats[e.cat]||e.cat);
    return '<div class="exp-item"><div class="exp-l"><div class="exp-cat-dot" style="background:'+color+'"></div><div><div class="exp-name">'+e.desc+'</div><div class="exp-date">'+e.date+' · '+catName+'</div></div></div><div class="exp-r"><span class="exp-amount">'+fmt(e.amount)+' €</span><button class="del-btn" onclick="delExpense('+e.id+')">✕</button></div></div>';
  }).join('');
  calcNom();
}
function setL(l){
  lang=l;
  ['es','en','pt'].forEach(function(x){document.getElementById('b-'+x).classList.toggle('on',x===l);});
  var t=TXT[l];
  document.getElementById('logo-sub').textContent=t.logoSub;
  document.getElementById('pg-title').textContent=t.pgTitle;
  document.getElementById('pg-sub').textContent=t.pgSub;
  [0,1,2].forEach(function(i){document.getElementById('tab'+i).textContent=t.tabs[i];});
  document.getElementById('nom-ct').textContent=t.nomCt;
  document.getElementById('nom-ct2').textContent=t.nomCt2;
  document.getElementById('nom-ct3').textContent=t.nomCt3;
  document.getElementById('lbl-sb').textContent=t.lblSb;
  document.getElementById('lbl-pagas').textContent=t.lblPagas;
  document.getElementById('pg12').textContent=t.pagas[0];
  document.getElementById('pg14').textContent=t.pagas[1];
  document.getElementById('lbl-irpf').textContent=t.lblIrpf;
  document.getElementById('lbl-ss').textContent=t.lblSs;
  document.getElementById('lbl-otros').textContent=t.lblOtros;
  document.getElementById('bud-ct').textContent=t.budCt;
  document.getElementById('exp-ct').textContent=t.expCt;
  document.getElementById('lbl-expdesc').textContent=t.lblExpDesc;
  document.getElementById('lbl-expamt').textContent=t.lblExpAmt;
  document.getElementById('lbl-expcat').textContent=t.lblExpCat;
  document.getElementById('btn-add').textContent=t.btnAdd;
  calcNom();renderExpenses();
}
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  var t=TXT[lang];
  document.getElementById('b-th').innerHTML=(isDark?'☀️ ':'🌙 ')+'<span id="th-lbl">'+(isDark?t.thOff:t.thOn)+'</span>';
}
syncSb(2000);syncIrpf(16);calcNom();renderExpenses();
</script>
